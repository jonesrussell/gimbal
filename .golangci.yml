linters:
  # Enable specific linters
  enable:
    # Default linters
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Additional recommended linters for game development
    - bodyclose      # Ensures HTTP response bodies are closed
    - contextcheck   # Checks context handling
    - errname       # Ensures error naming conventions
    - errorlint     # Ensures proper error handling
    - gocognit      # Checks cognitive complexity
    - gocritic      # Style and bug detection
    - gofmt         # Code formatting
    - goimports     # Import formatting
    - gosec         # Security checks
    - nilerr        # Checks nil error handling
    - prealloc      # Suggests slice preallocation (good for games)
    - whitespace    # Consistent whitespace

linters-settings:
  govet:
    enable-all: true
  gocognit:
    min-complexity: 15
  gocritic:
    enabled-tags:
      - performance
      - style
      - diagnostic
  gosec:
    excludes:
      - G404  # Insecure random number source (often needed in games)

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec

  # Exclude directories if needed
  exclude-dirs:
    - vendor
    - third_party

run:
  # Timeout for analysis
  timeout: 5m
  
  # Include test files
  tests: true

  # Build tags if needed
  build-tags:
    - integration
